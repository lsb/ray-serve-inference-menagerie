[tool:pytest]
minversion = 6.0
addopts = -ra -q --strict-markers
testpaths = tests clip-service/tests
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    clip: marks tests specific to CLIP service
    gemma: marks tests specific to Gemma service
    grounding_dino: marks tests specific to Grounding DINO service
