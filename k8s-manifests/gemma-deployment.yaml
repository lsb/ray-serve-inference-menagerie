apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-service
  labels:
    app: gemma-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma-service
  template:
    metadata:
      labels:
        app: gemma-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        accelerator: "nvidia-tesla-t4"   # update to match your GPU node label
      containers:
      - name: gemma-service
        image: YOUR_REGISTRY/gemma-service:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: 16Gi
            cpu: 2
          requests:
            nvidia.com/gpu: 1
            memory: 16Gi
            cpu: 1
