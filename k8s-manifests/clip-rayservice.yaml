apiVersion: ray.io/v1alpha1
kind: RayService
metadata:
  name: clip-service
  namespace: ray-serve-test
spec:
  serviceUnhealthySecondThreshold: 300
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    applications:
      - name: clip
        import_path: app:clip_service
        route_prefix: "/"
        runtime_env:
          working_dir: "."
        deployments:
          - name: CLIPService
            num_replicas: 1
            ray_actor_options:
              num_cpus: 2
              num_gpus: 0  # Will be overridden by GPU detection in code
  rayClusterConfig:
    rayVersion: '2.8.0'
    enableInTreeAutoscaling: true
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        metrics-export-port: '8080'
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.8.0-py310
              resources:
                limits:
                  cpu: 2
                  memory: 4Gi
                requests:
                  cpu: 1
                  memory: 2Gi
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
                - containerPort: 8080
                  name: metrics
              volumeMounts:
                - mountPath: /tmp/ray
                  name: ray-logs
                - mountPath: /app
                  name: app-code
          volumes:
            - name: ray-logs
              emptyDir: {}
            - name: app-code
              configMap:
                name: clip-service-code
    workerGroupSpecs:
      - replicas: 1
        minReplicas: 1
        maxReplicas: 3
        groupName: small-group
        rayStartParams: {}
        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.8.0-py310
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh","-c","ray stop"]
                resources:
                  limits:
                    cpu: 2
                    memory: 4Gi
                  requests:
                    cpu: 1
                    memory: 2Gi
                volumeMounts:
                  - mountPath: /tmp/ray
                    name: ray-logs
                  - mountPath: /app
                    name: app-code
            volumes:
              - name: ray-logs
                emptyDir: {}
              - name: app-code
                configMap:
                  name: clip-service-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clip-service-code
  namespace: ray-serve-test
data:
  app.py: |
    import os
    import time
    import signal
    import asyncio
    from typing import Dict, Any, List
    import ray
    from ray import serve
    import torch
    from transformers import pipeline
    from fastapi import FastAPI
    from fastapi.responses import JSONResponse

    app = FastAPI(title="CLIP Service", description="Zero-shot image classification using CLIP")

    @serve.deployment(
        route_prefix="/",
        ray_actor_options={"num_gpus": 1 if torch.cuda.is_available() else 0}
    )
    @serve.ingress(app)
    class CLIPService:
        def __init__(self):
            self.device_info = self._get_device_info()
            self.pipeline = self._initialize_pipeline()
            print(f"CLIP Service initialized with device: {self.device_info}")
        
        def _get_device_info(self) -> Dict[str, Any]:
            """Get device information for performance debugging."""
            device_info = {
                "cuda_available": torch.cuda.is_available(),
                "device_count": torch.cuda.device_count() if torch.cuda.is_available() else 0,
                "device_name": None,
                "device_type": "cpu"
            }
            
            if torch.cuda.is_available():
                device_info["device_name"] = torch.cuda.get_device_name(0)
                device_info["device_type"] = "gpu"
            
            return device_info
        
        def _initialize_pipeline(self):
            """Initialize CLIP pipeline with appropriate device."""
            device = 0 if torch.cuda.is_available() else -1
            return pipeline(
                "zero-shot-image-classification",
                model="openai/clip-vit-base-patch32",
                device=device
            )
        
        @app.get("/health")
        async def health_check(self):
            """Health check endpoint."""
            return {
                "status": "healthy",
                "service": "clip",
                "device_info": self.device_info
            }
        
        @app.post("/")
        async def classify_image(self, request_data: Dict[str, Any]) -> JSONResponse:
            """Main classification endpoint."""
            start_time = time.time()
            
            try:
                image_url = request_data.get("image_url")
                candidate_labels = request_data.get("labels")
                
                if not image_url or not candidate_labels:
                    return JSONResponse(
                        status_code=400,
                        content={"error": "Provide 'image_url' and 'labels' in request JSON."}
                    )
                
                if not isinstance(candidate_labels, list) or len(candidate_labels) == 0:
                    return JSONResponse(
                        status_code=400,
                        content={"error": "Labels must be a non-empty list."}
                    )
                
                inference_start = time.time()
                result = self.pipeline(image_url, candidate_labels=candidate_labels)
                inference_time = time.time() - inference_start
                
                total_time = time.time() - start_time
                
                response = {
                    "predictions": result,
                    "performance": {
                        "total_time_ms": round(total_time * 1000, 2),
                        "inference_time_ms": round(inference_time * 1000, 2),
                        "device_info": self.device_info
                    }
                }
                
                return JSONResponse(content=response)
                
            except Exception as e:
                error_time = time.time() - start_time
                return JSONResponse(
                    status_code=500,
                    content={
                        "error": f"Classification failed: {str(e)}",
                        "performance": {
                            "error_time_ms": round(error_time * 1000, 2),
                            "device_info": self.device_info
                        }
                    }
                )

    app = CLIPService
---
apiVersion: v1
kind: Service
metadata:
  name: clip-service-svc
  namespace: ray-serve-test
spec:
  selector:
    rayCluster: clip-service
    rayNodeType: head
  ports:
    - name: serve
      port: 8000
      targetPort: 8000
    - name: dashboard
      port: 8265
      targetPort: 8265
  type: ClusterIP
